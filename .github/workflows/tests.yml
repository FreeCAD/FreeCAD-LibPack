name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install script dependencies
        run: pip install -r Requirements.txt
      - name: Run unit tests
        run: python -m unittest discover -p "test_*.py"
